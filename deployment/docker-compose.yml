services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vqa_db
      POSTGRES_USER: vqa_user
      POSTGRES_PASSWORD: vqa_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vqa_user -d vqa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../
      dockerfile: deployment/backend/Dockerfile
    image: ${ECR_REGISTRY:-localhost}/${ECR_REPOSITORY_BACKEND:-vqa-system-api}:${IMAGE_TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://vqa_user:vqa_pass@postgres:5432/vqa_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_EXTERNAL_ENDPOINT=${MINIO_EXTERNAL_ENDPOINT:-localhost:9000}
      - ENCRYPTION_KEY=1AJqXqtGbJZP9TTWx3N5V6CfdBXzGDzp4VAseJaQwFc=
    env_file:
      - ../.env
    volumes:
      - /home/ubuntu/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deployment/frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    image: ${ECR_REGISTRY:-localhost}/${ECR_REPOSITORY_FRONTEND:-vqa-system-frontend}:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
