<!DOCTYPE html>

<html class="h-full bg-background" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MedVQA - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "on-secondary-fixed-variant": "#38485d",
                        "on-tertiary-container": "#ffede6",
                        "on-secondary-container": "#54647a",
                        "surface-container-high": "#e6e8ea",
                        "on-surface": "#191c1e",
                        "sidebar-bg": "#f9fafb",
                        "medical-success": "#10b981",
                        "tertiary-fixed": "#ffdbcd",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-highest": "#e0e3e5",
                        "secondary": "#505f76",
                        "error": "#ba1a1a",
                        "surface-tint": "#0053db",
                        "secondary-fixed": "#d3e4fe",
                        "inverse-surface": "#2d3133",
                        "primary": "#004ac6",
                        "background": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "surface-white": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "error-container": "#ffdad6",
                        "outline-variant": "#c3c6d7",
                        "on-background": "#191c1e",
                        "outline": "#737686",
                        "secondary-container": "#d0e1fb",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#bc4800",
                        "surface-variant": "#e0e3e5",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "on-primary-container": "#eeefff",
                        "border-subtle": "#e2e8f0",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface-container-low": "#f2f4f6",
                        "primary-container": "#2563eb",
                        "inverse-primary": "#b4c5ff",
                        "on-tertiary-fixed": "#360f00",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary": "#943700",
                        "on-secondary-fixed": "#0b1c30",
                        "on-primary-fixed": "#00174b",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface": "#f7f9fb",
                        "on-surface-variant": "#434655",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-on-surface": "#eff1f3",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#d8dadc",
                        "medical-error": "#ef4444"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "2rem",
                        "gutter": "1rem",
                        "inner-padding": "1rem",
                        "message-gap": "1.5rem",
                        "sidebar-width": "280px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "body-base": ["Inter"],
                        "mono-label": ["JetBrains Mono"],
                        "body-sm": ["Inter"],
                        "label-xs": ["Inter"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["18px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-base": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "mono-label": ["13px", { "lineHeight": "18px", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-xs": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .material-symbols-outlined {
                font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            }
        }
    </style>
</head>
<body class="h-full flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8 bg-background font-body-base text-on-background">
<div class="w-full max-w-[400px] bg-surface-white rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.02)] border border-border-subtle p-8 sm:p-10 flex flex-col items-center">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-8 w-full text-center">
<div class="h-12 w-12 rounded-full bg-primary-fixed flex items-center justify-center mb-4 text-primary">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">neurology</span>
</div>
<h1 class="text-primary font-headline-sm text-2xl font-bold mb-1 tracking-tight">MedVQA</h1>
<p class="text-on-surface-variant font-label-xs text-sm uppercase tracking-wider">Medical VQA &amp; Chatbot System</p>
</div>
<div class="w-full text-center mb-8">
<h2 class="font-headline-sm text-on-surface text-xl">Welcome back</h2>
<p class="text-on-surface-variant font-body-sm mt-1">Sign in to continue to your account</p>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-5" method="POST">
<div>
<label class="block text-sm font-label-md text-on-surface mb-1" for="email">Email</label>
<div class="relative">
<input autocomplete="email" class="appearance-none block w-full px-4 py-3 border border-border-subtle rounded-lg placeholder-outline-variant text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm font-body-sm bg-surface-white transition-colors" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<div>
<label class="block text-sm font-label-md text-on-surface mb-1" for="password">Password</label>
<div class="relative">
<input autocomplete="current-password" class="appearance-none block w-full px-4 py-3 border border-border-subtle rounded-lg placeholder-outline-variant text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm font-body-sm bg-surface-white transition-colors" id="password" name="password" placeholder="••••••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-border-subtle rounded bg-surface-white cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm font-body-sm text-on-surface-variant cursor-pointer" for="remember-me">
                        Remember me
                    </label>
</div>
<div class="text-sm font-body-sm">
<a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">
                        Forgot password?
                    </a>
</div>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-label-md text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors cursor-pointer active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</div>
</form>
<div class="mt-6 text-center w-full">
<p class="text-sm font-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center space-x-2 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="font-label-xs text-xs">Secure &amp; HIPAA-conscious</span>
</div>
</body></html>
