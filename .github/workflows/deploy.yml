name: Deploy App to AWS Server
on:
  push:
    branches:
      - main
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: tker/vqa-system-api
  ECR_REPOSITORY_FRONTEND: tker/vqa-system-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "IMAGE_TAG_FULL=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build, tag, and push Backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG

      - name: Build, tag, and push Frontend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Pass the backend API URL dynamically so Vite can build it
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          docker build --build-arg VITE_API_URL=$VITE_API_URL -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

      - name: Get ECR login token
        id: ecr-token
        run: |
          TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # Passing all required secrets to the runner
          envs: ECR_TOKEN,ECR_REGISTRY,ECR_REPOSITORY_BACKEND,ECR_REPOSITORY_FRONTEND,IMAGE_TAG,DATABASE_URL,JWT_SECRET_KEY,ENCRYPTION_KEY,REDIS_URL,MINIO_ENDPOINT,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,LLM_API_KEY
          script: |
            # Login to ECR
            echo "$ECR_TOKEN" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY

            # --- Free up disk space BEFORE pulling heavy images ---
            sudo docker container prune -f
            sudo docker image prune -af
            sudo docker volume prune -f
            sudo docker builder prune -af

            # Navigate to application directory
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            # Export variables required by docker-compose.yml
            export ECR_REGISTRY=$ECR_REGISTRY
            export ECR_REPOSITORY_BACKEND=$ECR_REPOSITORY_BACKEND
            export ECR_REPOSITORY_FRONTEND=$ECR_REPOSITORY_FRONTEND
            export IMAGE_TAG=$IMAGE_TAG

            # Create the .env file for the backend container (no leading spaces)
            cat > .env <<EOF
            JWT_SECRET_KEY=$JWT_SECRET_KEY
            ENCRYPTION_KEY=$ENCRYPTION_KEY
            DATABASE_URL=$DATABASE_URL
            REDIS_URL=$REDIS_URL
            MINIO_ENDPOINT=$MINIO_ENDPOINT
            MINIO_ACCESS_KEY=$MINIO_ACCESS_KEY
            MINIO_SECRET_KEY=$MINIO_SECRET_KEY
            LLM_API_KEY=$LLM_API_KEY
            EOF

            # Pull the new images from ECR
            sudo docker pull $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
            sudo docker pull $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

            # Stop running containers, then start with new images
            sudo docker compose down || true
            sudo docker compose up -d

        env:
          ECR_TOKEN: ${{ steps.ecr-token.outputs.token }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
