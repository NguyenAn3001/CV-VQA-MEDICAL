name: Deploy App to AWS Server
on:
  push:
    branches:
      - main
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_BACKEND: tker/vqa-system-api
  ECR_REPOSITORY_FRONTEND: tker/vqa-system-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "IMAGE_TAG_FULL=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build, tag, and push Backend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG

      - name: Build, tag, and push Frontend image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Pass the backend API URL dynamically so Vite can build it
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          docker build --build-arg VITE_API_URL=$VITE_API_URL -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG

      - name: Get ECR login token
        id: ecr-token
        run: |
          TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_TOKEN,ECR_REGISTRY,ECR_REPOSITORY_BACKEND,ECR_REPOSITORY_FRONTEND,IMAGE_TAG,DATABASE_URL,JWT_SECRET_KEY,ENCRYPTION_KEY,REDIS_URL,MINIO_ENDPOINT,MINIO_ACCESS_KEY,MINIO_SECRET_KEY,LLM_API_KEY
          script: |
            set -e

            # Login to ECR
            echo "$ECR_TOKEN" | sudo docker login --username AWS --password-stdin $ECR_REGISTRY

            # Free up disk space BEFORE pulling heavy images
            sudo docker container prune -f
            sudo docker image prune -af
            sudo docker volume prune -f
            sudo docker builder prune -af

            # Ensure app directory exists
            mkdir -p /home/ubuntu/app

            # Write .env file with absolute path
            cat > /home/ubuntu/app/.env << ENVEOF
JWT_SECRET_KEY=${JWT_SECRET_KEY}
ENCRYPTION_KEY=${ENCRYPTION_KEY}
DATABASE_URL=${DATABASE_URL}
REDIS_URL=${REDIS_URL}
MINIO_ENDPOINT=${MINIO_ENDPOINT}
MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
LLM_API_KEY=${LLM_API_KEY}
ENVEOF

            # Write docker-compose.yml with absolute path (always overwrite with latest)
            cat > /home/ubuntu/app/docker-compose.yml << 'COMPOSEEOF'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vqa_db
      POSTGRES_USER: vqa_user
      POSTGRES_PASSWORD: vqa_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vqa_user -d vqa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: BACKEND_IMAGE
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql+asyncpg://vqa_user:vqa_pass@postgres:5432/vqa_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
    env_file:
      - .env
    volumes:
      - /home/ubuntu/models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    image: FRONTEND_IMAGE
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  miniodata:
COMPOSEEOF

            # Replace image placeholders with actual ECR image URIs
            sed -i "s|BACKEND_IMAGE|${ECR_REGISTRY}/${ECR_REPOSITORY_BACKEND}:${IMAGE_TAG}|g" /home/ubuntu/app/docker-compose.yml
            sed -i "s|FRONTEND_IMAGE|${ECR_REGISTRY}/${ECR_REPOSITORY_FRONTEND}:${IMAGE_TAG}|g" /home/ubuntu/app/docker-compose.yml

            # Pull the new images from ECR
            sudo docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY_BACKEND}:${IMAGE_TAG}
            sudo docker pull ${ECR_REGISTRY}/${ECR_REPOSITORY_FRONTEND}:${IMAGE_TAG}

            # Stop and restart with new images
            sudo docker compose -f /home/ubuntu/app/docker-compose.yml down || true
            sudo docker compose -f /home/ubuntu/app/docker-compose.yml up -d

        env:
          ECR_TOKEN: ${{ steps.ecr-token.outputs.token }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
